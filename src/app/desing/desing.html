<main>
    <div class="proect">
         <h3>{{ 'PROJECTS.TITLE' | translate }}</h3>
    </div> 
    <article>
        <div class="all">
            <div class="ice">
                <button class="prev" (pointerdown)="icePrev()">&#10094;</button>
                <img
                    [src]="ice[iceIndex]"
                    alt="Slide Image"
                    class="iceimg" />
                <button class="next" (pointerdown)="iceNext()">&#10095;</button>
            </div>
            <div class="border">
                <p class="singh">{{ 'PROJECTS.SINGH_TITLE' | translate }}</p>
                <p [innerHTML]="'PROJECTS.SINGH_DESC' | translate"></p><br/>
                <p [innerHTML]="'PROJECTS.SINGH_MORE' | translate"></p><br/>
                <div class="last">
                    <div class="sitebutton">
                        <a class="site" href="https://sweet-html.vercel.app/" target="_blank" rel="noopener noreferrer">Visit site</a>
                        <a class="github" href="https://github.com/kasaburi/ice-cream.git" target="_blank" rel="noopener noreferrer">Visit GitHub</a>
                    </div>
                </div>
            </div>
        </div>
        <div class="hotel">
            <div class="imghotel">
                <button class="hotprev" (pointerdown)="hotelPrev()">&#10094;</button>
                <img [src]="hotel[hotelIndex]"  alt="Slide Image"
                    class="hotelimg" />
                <button class="hotnext" (pointerdown)="hotelNext()">&#10095;</button>
            </div>
            <div class="border1">
                <p class="singh">hotell</p>
                <p [innerHTML]="'HOTEL.DESC' | translate"></p>
                <p [innerHTML]="'HOTEL.MORE' | translate"></p>
                <div class="last">
                    <div class="sitebutton">
                        <a class="site" href="https://hotel-eta-six.vercel.app/" target="_blank" rel="noopener noreferrer">Visit site</a>
                        <a class="github" href="https://github.com/kasaburi/hotel.git" target="_blank" rel="noopener noreferrer">Visit GitHub</a>
                    </div>
                </div>
            </div>
        </div>
        <div class="shoping">
            <div class="shopimg">
                <button class="nav-btnprev" (pointerdown)="prev1()">&#10094;</button>
                <img [src]="shoping[currentIndex1]" alt="Slide Image"
                    class="images"  />
                <button class="nav-btnnext" (pointerdown)="next1()">&#10095;</button>
            </div>
            <div class="border2">
                <p class="singh">Shopping</p>
                <p [innerHTML]="'SHOP_PROJECT.DESC' | translate"   class="desc"></p>
                <div class="last">
                    <div class="sitebutton">
                        <a class="site" href="https://shoping-seven-rho.vercel.app/" target="_blank" rel="noopener noreferrer">Visit site</a>
                        <a class="github" href="https://github.com/kasaburi/shop.git" target="_blank" rel="noopener noreferrer">Visit GitHub</a>
                    </div>
                </div>
            </div>
        </div>
        <div class="restoran" id="restoran">
            <div class="resimg">
                <button class="resprev" (pointerdown)="resPrev()">&#10094;</button>
                <img [src]="restoranimg[Indexres]"  alt="Slide Image"
                    class="imgres"/>
                <button class="resnext" (pointerdown)="resNext()">&#10095;</button>
            </div>
            <div class="border3">
                <p class="singh">Restoran</p>
                <p [innerHTML]="'restoran.res' | translate"   class="desc"></p>
                <div class="last">
                    <div class="sitebutton">
                        <a class="site" href="https://restoran-one-bice.vercel.app/" target="_blank" rel="noopener noreferrer">Visit site</a>
                        <a class="github" href="https://github.com/kasaburi/restoran.git" target="_blank" rel="noopener noreferrer">Visit GitHub</a>
                    </div>
                </div>
            </div>
        </div>
    </article>
</main>
